<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhodos Travel App Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0b1220;
  color:white;
}

header{
  padding:16px;
  text-align:center;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
}

#map{height:32vh;}

.container{
  padding:12px;
  max-width:900px;
  margin:auto;
}

/* MODE BAR */
.filters{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px;
}

.filters button{
  padding:8px 12px;
  border:none;
  border-radius:999px;
  background:#111a2e;
  color:white;
  cursor:pointer;
}

.filters button.active{
  background:#2563eb;
}

/* CARDS */
.card{
  background:#111a2e;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:12px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content{padding:12px;}

.tag{
  font-size:11px;
  background:#1e40af;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-box{
  width:92%;
  max-width:520px;
  background:#111a2e;
  border-radius:16px;
  overflow:hidden;
}

.modal img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.modal-body{padding:12px;}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin-top:10px;
}

.gallery img{
  width:100%;
  height:90px;
  border-radius:8px;
}

/* AI */
.ai{
  padding:12px;
}

.chat{
  background:#111a2e;
  height:120px;
  overflow:auto;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.ai input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
}

/* BUTTONS */
.btn{
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>🌍 Rhodos Travel Ultra</h2>
<p>Map + Filter + Swipe + AI + Favorites</p>
</header>

<div id="map"></div>

<div class="filters">
<button onclick="setMode('browse')">🗺 Browse</button>
<button onclick="setMode('swipe')">📱 Swipe</button>
<button onclick="setMode('ai')">🧠 AI</button>

<button onclick="setFilter('all')">Alla</button>
<button onclick="setFilter('strand')">Stränder</button>
<button onclick="setFilter('mat')">Mat</button>
<button onclick="setFilter('bar')">Barer</button>
<button onclick="setFilter('aktivitet')">Aktiviteter</button>

<button onclick="sortByPrice()">💰 Billigast</button>
</div>

<div class="container">

<div id="list"></div>

<!-- AI -->
<div class="ai" id="aiBox" style="display:none;">
<h3>🧠 AI Assistent</h3>
<div class="chat" id="chat"></div>
<input id="aiInput" placeholder="Fråga t.ex. bästa strand?" onkeydown="if(event.key==='Enter')askAI()">
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<img id="mainimg">
<div class="modal-body">
<h2 id="title"></h2>
<p id="desc"></p>
<p id="meta"></p>
<div class="gallery" id="gallery"></div>
<button class="btn" id="fav">❤️ Spara</button>
</div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let mode="browse";
let filter="all";
let swipeIndex=0;
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");

const center=[36.434,28.217];

const places=[
{name:"Elli Beach",cat:"strand",price:15,lat:36.4519,lng:28.2220,
desc:"Strand i Rhodos stad",
img:["https://images.unsplash.com/photo-1507525428034-b723cf961d3e","https://images.unsplash.com/photo-1500375592092-40eb2168fd21","https://images.unsplash.com/photo-1501785888041-af3ef285b470"]},

{name:"Anthony Quinn Bay",cat:"strand",price:0,lat:36.3456,lng:28.2312,
desc:"Snorkling paradis",
img:["https://images.unsplash.com/photo-1500375592092-40eb2168fd21","https://images.unsplash.com/photo-1507525428034-b723cf961d3e","https://images.unsplash.com/photo-1470770903676-rocks"]},

{name:"Gyros Faliraki",cat:"mat",price:4,lat:36.3398,lng:28.1996,
desc:"Billig mat",
img:["https://images.unsplash.com/photo-1600891964092-4316c288032e","https://images.unsplash.com/photo-1565299624946-b28f40a0ae38","https://images.unsplash.com/photo-1546069901-ba9599a7e63c"]},

{name:"Sunset Bar",cat:"bar",price:10,lat:36.25,lng:28.12,
desc:"Cocktails + solnedgång",
img:["https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6","https://images.unsplash.com/photo-1516997121675-4c2d1684aa3e","https://images.unsplash.com/photo-1525268323446-0505b6fe7778"]},

{name:"Old Town Walk",cat:"aktivitet",price:0,lat:36.4420,lng:28.2278,
desc:"Historisk stad",
img:["https://images.unsplash.com/photo-1501785888041-af3ef285b470","https://images.unsplash.com/photo-1470770903676-rocks","https://images.unsplash.com/photo-1499856871958"]},
];

// MAP
let map=L.map('map').setView(center,11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

places.forEach(p=>{
L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.name);
});

// RENDER
function render(){
if(mode!=="browse") return;

let list=document.getElementById("list");
list.innerHTML="";

places
.filter(p=>filter==="all"?true:p.cat===filter)
.forEach(p=>{

list.innerHTML+=`
<div class="card" onclick="openPlace('${p.name}',\`${p.desc}\`,${JSON.stringify(p.img)},${p.price},'${p.cat}',${p.lat},${p.lng})">
<img src="${p.img[0]}">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<span class="tag">${p.cat}</span>
<span class="tag">${p.price}€</span>
</div>
</div>
`;
});
}

// MODAL
function openPlace(name,desc,img,price,cat,lat,lng){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=name;
document.getElementById("desc").innerText=desc;
document.getElementById("meta").innerText=`${cat} • ${price}€`;

document.getElementById("mainimg").src=img[0];

let g=document.getElementById("gallery");
g.innerHTML="";
img.forEach(i=>g.innerHTML+=`<img src="${i}">`);

document.getElementById("fav").onclick=()=>{
favorites.push(name);
localStorage.setItem("fav",JSON.stringify(favorites));
alert("Sparad ❤️");
};
}

// FILTER
function setFilter(f){
filter=f;
render();
}

// SORT
function sortByPrice(){
places.sort((a,b)=>a.price-b.price);
render();
}

// MODE
function setMode(m){
mode=m;
document.getElementById("aiBox").style.display=m==="ai"?"block":"none";

if(m==="browse") render();
if(m==="swipe") swipeMode();
}

// SWIPE MODE
function swipeMode(){
let list=document.getElementById("list");
let p=places[swipeIndex%places.length];

list.innerHTML=`
<div class="card">
<img src="${p.img[0]}">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<button class="btn" onclick="swipeNext()">Nästa ➡️</button>
<button class="btn" onclick="alert('❤️ sparad')">Like</button>
</div>
</div>
`;
}

function swipeNext(){
swipeIndex++;
swipeMode();
}

// AI (enkel men fungerande)
function askAI(){
let input=document.getElementById("aiInput").value;
let chat=document.getElementById("chat");

let reply="Jag kan hjälpa dig med stränder, mat och barer 🌴";

if(input.toLowerCase().includes("strand")) reply="Anthony Quinn eller Elli Beach är bäst 🏖";
if(input.toLowerCase().includes("billigt")) reply="Gyros Faliraki är billigast 🍝";
if(input.toLowerCase().includes("bar")) reply="Sunset Bar för kväll 🍹";

chat.innerHTML+=`<div><b>Du:</b> ${input}</div>`;
chat.innerHTML+=`<div><b>AI:</b> ${reply}</div>`;
document.getElementById("aiInput").value="";
}

// INIT
render();

</script>

</body>
</html>
