<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhodos Travel App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0b1220;
  color:white;
}

header{
  padding:18px;
  text-align:center;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
}

#map{
  height:40vh;
  width:100%;
}

.container{
  padding:12px;
  max-width:900px;
  margin:auto;
}

/* CARDS */
.card{
  background:#111a2e;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.price{
  color:#22c55e;
  font-weight:600;
  font-size:13px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  width:92%;
  max-width:500px;
  background:#111a2e;
  border-radius:16px;
  overflow:hidden;
  animation:pop 0.25s ease;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

.modal-box img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.modal-body{
  padding:12px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin:10px 0;
}

.gallery img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.btn{
  display:inline-block;
  padding:10px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  margin-top:8px;
  font-size:13px;
}

.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>🌴 Rhodos Travel App</h2>
<p>Karta + klickbara platser + detaljer</p>
</header>

<div id="map"></div>

<div class="container">

<h3>🏖 Stränder</h3>

<div class="card" onclick="openPlace('Elli Beach','Central strand i Rhodos stad',[
'https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80'
],36.4519,28.2220)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80">
<div class="card-content">
<h3>Elli Beach</h3>
<p>Rhodos stad • strand + barer</p>
</div>
</div>

<div class="card" onclick="openPlace('Anthony Quinn Bay','Snorkling och klippor',[
'https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1470770903676-69b98201ea1c?auto=format&fit=crop&w=1200&q=80'
],36.3456,28.2312)">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1200&q=80">
<div class="card-content">
<h3>Anthony Quinn Bay</h3>
<p>Snorkling paradis</p>
</div>
</div>

<h3>🍝 Restauranger</h3>

<div class="card" onclick="openPlace('Gyros Faliraki','Billig street food',[
'https://images.unsplash.com/photo-1600891964092-4316c288032e?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=1200&q=80'
],36.3398,28.1996)">
<img src="https://images.unsplash.com/photo-1600891964092-4316c288032e?auto=format&fit=crop&w=1200&q=80">
<div class="card-content">
<h3>Gyros Faliraki</h3>
<p>3–6€ street food</p>
</div>
</div>

<div class="card" onclick="openPlace('Sea View Taverna','Havsutsikt & grekisk mat',[
'https://images.unsplash.com/photo-1541542684-4a1f7c0a3c8d?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1200&q=80',
'https://images.unsplash.com/photo-1555992336-03a23c8b3d74?auto=format&fit=crop&w=1200&q=80'
],36.2200,28.1500)">
<img src="https://images.unsplash.com/photo-1541542684-4a1f7c0a3c8d?auto=format&fit=crop&w=1200&q=80">
<div class="card-content">
<h3>Sea View Taverna</h3>
<p>Romantiskt middag</p>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="close" onclick="closeModal()">✖</div>
<img id="mainimg">
<div class="modal-body">
<h2 id="title"></h2>
<p id="desc"></p>

<div class="gallery" id="gallery"></div>

<a class="btn" id="maps">Öppna i Google Maps</a>
</div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([36.434, 28.217], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:''
}).addTo(map);

// PLACES
function marker(name,lat,lng){
  L.marker([lat,lng]).addTo(map).bindPopup(name);
}

marker("Elli Beach",36.4519,28.2220);
marker("Anthony Quinn",36.3456,28.2312);
marker("Gyros Faliraki",36.3398,28.1996);
marker("Sea View Taverna",36.2200,28.1500);

// OPEN PLACE
function openPlace(title,desc,images,lat,lng){

  document.getElementById("modal").style.display="flex";
  document.getElementById("title").innerText=title;
  document.getElementById("desc").innerText=desc;

  document.getElementById("mainimg").src=images[0];

  let gal = document.getElementById("gallery");
  gal.innerHTML="";

  images.forEach(img=>{
    gal.innerHTML += `<img src="${img}">`;
  });

  document.getElementById("maps").href=
  `https://www.google.com/maps?q=${lat},${lng}`;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
