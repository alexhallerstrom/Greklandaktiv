<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhodos Travel OS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Inter;
background:#050816;
color:white;
}

header{
padding:14px;
text-align:center;
background:linear-gradient(135deg,#2563eb,#22c55e);
}

/* MAP */
#map{height:28vh;}

/* APP CONTAINER */
.container{
padding:10px;
max-width:900px;
margin:auto;
}

/* BOTTOM NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:space-around;
background:rgba(15,23,42,0.95);
backdrop-filter:blur(10px);
padding:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

.nav button{
background:none;
border:none;
color:white;
font-size:12px;
cursor:pointer;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border-radius:16px;
overflow:hidden;
margin-bottom:12px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{padding:10px;}

.tag{
font-size:11px;
background:#2563eb;
padding:4px 8px;
border-radius:999px;
margin-right:6px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
width:92%;
max-width:520px;
background:#0f172a;
border-radius:16px;
overflow:hidden;
}

.modal img{
width:100%;
height:180px;
object-fit:cover;
}

.modal-body{padding:12px;}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
}

.gallery img{
width:100%;
height:90px;
border-radius:8px;
}

/* AI */
.chat{
height:140px;
overflow:auto;
background:rgba(255,255,255,0.06);
padding:10px;
border-radius:12px;
font-size:12px;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
background:rgba(255,255,255,0.08);
color:white;
}
</style>
</head>

<body>

<header>
<h2>🌍 Rhodos Travel OS Pro</h2>
<p>Din kompletta reseapp</p>
</header>

<div id="map"></div>

<div class="container">

<div id="view"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<img id="img">
<div class="modal-body">
<h3 id="title"></h3>
<p id="desc"></p>
<p id="meta"></p>
<div class="gallery" id="gal"></div>
</div>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
<button onclick="setView('explore')">🧭 Explore</button>
<button onclick="setView('map')">🗺 Map</button>
<button onclick="setView('swipe')">📱 Swipe</button>
<button onclick="setView('ai')">🧠 AI</button>
<button onclick="setView('saved')">❤️ Saved</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const center=[36.434,28.217];

let mode="explore";
let i=0;

let saved=JSON.parse(localStorage.getItem("saved")||"[]");

const places=[
{name:"Elli Beach",cat:"strand",price:15,lat:36.4519,lng:28.2220,
desc:"Centrala strand med barer och liv hela dagen",
img:["https://images.unsplash.com/photo-1507525428034","https://images.unsplash.com/photo-1500375592092"]},

{name:"Anthony Quinn",cat:"strand",price:0,lat:36.3456,lng:28.2312,
desc:"Snorkling paradis med kristallklart vatten",
img:["https://images.unsplash.com/photo-1500375592092","https://images.unsplash.com/photo-1507525428034"]},

{name:"Gyros Spot",cat:"mat",price:4,lat:36.3398,lng:28.1996,
desc:"Billig och galet god street food",
img:["https://images.unsplash.com/photo-1600891964092","https://images.unsplash.com/photo-1565299624946"]},

{name:"Sunset Bar",cat:"bar",price:12,lat:36.25,lng:28.12,
desc:"Solnedgång + cocktails + musik",
img:["https://images.unsplash.com/photo-1505228395891","https://images.unsplash.com/photo-1516997121675"]},

{name:"Old Town",cat:"aktivitet",price:0,lat:36.4420,lng:28.2278,
desc:"Magisk historisk stad",
img:["https://images.unsplash.com/photo-1501785888041","https://images.unsplash.com/photo-1470770903676"]}
];

// MAP
let map=L.map('map').setView(center,11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

places.forEach(p=>{
L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.name);
});

// VIEW SYSTEM
function setView(v){
mode=v;

document.getElementById("view").innerHTML="";

if(v==="explore") renderList();
if(v==="swipe") renderSwipe();
if(v==="ai") renderAI();
if(v==="saved") renderSaved();
if(v==="map") alert("Kartan är redan uppe ↑");
}

// LIST
function renderList(){
let v=document.getElementById("view");
v.innerHTML=places.map(p=>`
<div class="card" onclick="openP('${p.name}',\`${p.desc}\`,${JSON.stringify(p.img)},${p.price})">
<img src="${p.img[0]}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<span class="tag">${p.cat}</span>
<span class="tag">${p.price}€</span>
</div>
</div>
`).join("");
}

// SWIPE
function renderSwipe(){
let p=places[i%places.length];

document.getElementById("view").innerHTML=`
<div class="card">
<img src="${p.img[0]}">
<div class="card-body">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<button onclick="i++;renderSwipe()">➡️ Nästa</button>
<button onclick="save('${p.name}')">❤️ Save</button>
</div>
</div>
`;
}

// AI
function renderAI(){
document.getElementById("view").innerHTML=`
<div class="chat" id="chat"></div>
<input id="q" placeholder="Fråga AI... (strand, mat, bar)" onkeydown="if(event.key==='Enter')askAI()">
`;
}

function askAI(){
let q=document.getElementById("q").value.toLowerCase();
let chat=document.getElementById("chat");

let r="Jag hjälper dig hitta bästa platser 🌍";

if(q.includes("strand")) r="Anthony Quinn är bäst 🏖";
if(q.includes("billigt")) r="Gyros Spot 🍝";
if(q.includes("bar")) r="Sunset Bar 🍹";

chat.innerHTML+=`<div><b>Du:</b> ${q}</div>`;
chat.innerHTML+=`<div><b>AI:</b> ${r}</div>`;
document.getElementById("q").value="";
}

// SAVED
function renderSaved(){
document.getElementById("view").innerHTML=
saved.map(s=>`<div class="card"><div class="card-body">${s}</div></div>`).join("");
}

function save(name){
saved.push(name);
localStorage.setItem("saved",JSON.stringify(saved));
alert("Sparad ❤️");
}

// MODAL
function openP(n,d,img,price){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=n;
document.getElementById("desc").innerText=d;
document.getElementById("meta").innerText="Pris: "+price+"€";

document.getElementById("img").src=img[0];

let g=document.getElementById("gal");
g.innerHTML=img.map(i=>`<img src="${i}">`).join("");
}

// INIT
setView('explore');

</script>

</body>
</html>
